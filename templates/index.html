<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crop Recommendation 🌱</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #a8edea, #fed6e3);
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      text-align: center;
      font-weight: bold;
      color: #2e7d32;
    }

    .navbar {
      background: linear-gradient(to right, #2e7d32, #1b5e20);
    }

    .container-box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0px 8px 25px rgba(0,0,0,0.1);
    }

    label {
      font-weight: 600;
      color: #1b5e20;
    }

    .btn-primary {
      background: linear-gradient(to right, #43cea2, #185a9d);
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .card {
      margin: 30px auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
    }

    .card-body {
      background: linear-gradient(to right, #43cea2, #185a9d);
      color: white;
      text-align: center;
    }

    .card-title {
      font-size: 18px;
    }

    .card-text {
      font-size: 22px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌱 Crop Recommendation</a>
  </div>
</nav>

<!-- MAIN -->

<div class="container my-4">
  <div class="container-box">


<h1>Crop Recommendation System 🌿</h1>

<form action="/predict" method="POST">

  <div class="row mt-4">
    <div class="col-md-4">
      <label>Nitrogen</label>
      <input type="number" name="Nitrogen" class="form-control" required>
    </div>
    <div class="col-md-4">
      <label>Phosphorus</label>
      <input type="number" name="Phosporus" class="form-control" required>
    </div>
    <div class="col-md-4">
      <label>Potassium</label>
      <input type="number" name="Potassium" class="form-control" required>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-md-4">
      <label>Temperature (°C)</label>
      <input type="number" step="0.01" name="Temperature" class="form-control" required>
    </div>
    <div class="col-md-4">
      <label>Humidity (%)</label>
      <input type="number" step="0.01" name="Humidity" class="form-control" required>
    </div>
    <div class="col-md-4">
      <label>pH</label>
      <input type="number" step="0.01" name="Ph" class="form-control" required>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-md-4">
      <label>Rainfall (mm)</label>
      <input type="number" step="0.01" name="Rainfall" class="form-control" required>
    </div>
  </div>

  <div class="text-center mt-4">
    <button type="submit" class="btn btn-primary">Get Recommendation 🌾</button>
  </div>

</form>

{% if result %}
<div class="card" style="width: 20rem;">
  <img src="{{url_for('static', filename='img.jpg')}}" class="card-img-top">
  <div class="card-body">
   
    <p class="card-text">{{ result }}</p>
  </div>
</div>
{% endif %}

  </div>
</div>

</body>
</html>
